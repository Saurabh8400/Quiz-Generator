# ============================================================
# AI Quiz Generator - Application Configuration
# ============================================================

# Server
server.port=9091

# ---- Database ----
spring.datasource.url=jdbc:mysql://localhost:3306/ai_quiz_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=100rabh.Mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
jwt.secret=aiquizgenerator_super_secret_key_1234567890abcdefghij
jwt.expiration=86400000

# ---- LLM API (OpenAI) ----
llm.api.url=https://api.openai.com/v1/chat/completions
llm.api.key=your_openai_api_key_here
llm.api.model=gpt-3.5-turbo
llm.api.max-tokens=2000
llm.api.temperature=0.7
llm.api.timeout-seconds=60

# ---- Logging ----
logging.level.com.aiquiz=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
